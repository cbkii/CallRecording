name: Manual Release APK Variants

run-name: >-
  Manual release ${{ inputs.tag || inputs.version || 'from-versionName' }}
  from ${{ inputs.target_ref || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag / GitHub Release tag to create. Leave blank to use versionName from app/build.gradle.kts."
        required: false
        default: ""
      version:
        description: "Version value (e.g. 2.1.0). Used when tag is empty; ignored if tag is explicitly set."
        required: false
        default: ""
      auto_bump:
        description: "Automatically bump patch version when tag/version already exists (recommended default)."
        required: false
        type: boolean
        default: true
      name:
        description: "GitHub Release title. Leave blank to use the resolved tag."
        required: false
        default: ""
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: false
      include_safe_global_enable:
        description: "Include SAFE_GLOBAL_ENABLE variant (primary)"
        required: false
        type: boolean
        default: true
      include_force_legacy_us:
        description: "Include FORCE_LEGACY_US variant"
        required: false
        type: boolean
        default: true
      include_observe_only:
        description: "Include OBSERVE_ONLY variant"
        required: false
        type: boolean
        default: true
      target_ref:
        description: "Branch, tag, or SHA to release from (leave blank to use the triggering ref)."
        required: false
        default: ""

concurrency:
  # Scope concurrency by workflow + selected ref so manual runs do not collide unexpectedly.
  group: release-${{ github.repository }}-${{ github.workflow }}-${{ inputs.target_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_ref || github.ref_name }}

      - name: Validate selected source ref
        id: source_ref
        shell: bash
        run: |
          set -euo pipefail
          REQUESTED_REF="${{ inputs.target_ref || github.ref_name }}"
          if git show-ref --verify --quiet "refs/remotes/origin/${REQUESTED_REF}"; then
            echo "push_ref=$REQUESTED_REF" >> "$GITHUB_OUTPUT"
          else
            echo "::error::target_ref must be a branch for this workflow because it commits and pushes versionName."
            exit 1
          fi
          RESOLVED_SHA="$(git rev-parse HEAD)"
          echo "Manual release source ref: $REQUESTED_REF"
          echo "Manual release source SHA: $RESOLVED_SHA"

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION_NAME="$(sed -n 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n 1)"
          VERSION_CODE="$(sed -n 's/^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*\([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -n 1)"

          [ -n "$VERSION_NAME" ] || { echo "::error::Could not parse versionName from app/build.gradle.kts"; exit 1; }
          [ -n "$VERSION_CODE" ] || { echo "::error::Could not parse versionCode from app/build.gradle.kts"; exit 1; }

          sanitize_tag() { printf '%s' "$1" | tr -cd 'a-zA-Z0-9._+-'; }
          sanitize_name() { printf '%s' "$1" | tr -d '\n\r' | tr -cd '[:print:]'; }

          SAFE_TAG="$(sanitize_tag "${{ inputs.tag || '' }}")"
          SAFE_VERSION="$(sanitize_tag "${{ inputs.version || '' }}")"
          SAFE_NAME="$(sanitize_name "${{ inputs.name || '' }}")"

          BASE_TAG="${SAFE_TAG:-${SAFE_VERSION:-$VERSION_NAME}}"
          TAG="$BASE_TAG"

          bump_patch() {
            local tag="$1" prefix="" ver
            [[ "$tag" == v* ]] && prefix="v" && ver="${tag#v}" || ver="$tag"
            if [[ "$ver" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
              echo "${prefix}${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3]+1))"
            else
              echo "${tag}.1"
            fi
          }

          if [ "${{ inputs.auto_bump }}" = "true" ]; then
            while git rev-parse -q --verify "refs/tags/$TAG" > /dev/null 2>&1; do
              BUMPED="$(bump_patch "$TAG")"
              echo "Tag $TAG already exists, auto-bumping to $BUMPED"
              TAG="$BUMPED"
            done
          elif git rev-parse -q --verify "refs/tags/$TAG" > /dev/null 2>&1; then
            echo "::error::Tag $TAG already exists and auto_bump=false. Choose another tag/version or enable auto bump."
            exit 1
          fi

          RELEASE_NAME="${SAFE_NAME:-$TAG}"
          APP_VERSION="${TAG#v}"
          APK_BASENAME="callrecording-${TAG}.apk"
          SHA256_NAME="${APK_BASENAME}.sha256"

          PREV_TAG="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/$GITHUB_REPOSITORY/releases?per_page=50" \
            --jq '[.[] | select(.draft == false) | .tag_name][0] // ""' 2>/dev/null || echo "")"

          {
            echo "version_name=$VERSION_NAME"
            echo "version_code=$VERSION_CODE"
            echo "tag=$TAG"
            echo "app_version=$APP_VERSION"
            echo "release_name=$RELEASE_NAME"
            echo "apk_basename=$APK_BASENAME"
            echo "sha256_name=$SHA256_NAME"
            echo "prev_tag=$PREV_TAG"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved versionName: $VERSION_NAME"
          echo "Resolved versionCode: $VERSION_CODE"
          echo "Release tag: $TAG"
          echo "Release app version: $APP_VERSION"
          echo "Release title: $RELEASE_NAME"
          echo "Requested base tag/version: $BASE_TAG"
          echo "Previous release tag: ${PREV_TAG:-<none>}"

      - name: Apply resolved release version to codebase
        id: sync_version
        shell: bash
        run: |
          set -euo pipefail

          TARGET_VERSION='${{ steps.meta.outputs.app_version }}'
          CURRENT_VERSION="$(sed -n 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n 1)"

          [ -n "$TARGET_VERSION" ] || { echo "::error::Resolved app version is empty"; exit 1; }
          [ -n "$CURRENT_VERSION" ] || { echo "::error::Could not parse current versionName from app/build.gradle.kts"; exit 1; }

          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            sed -i "s/^\([[:space:]]*versionName[[:space:]]*=[[:space:]]*\)\"[^\"]*\"/\1\"${TARGET_VERSION}\"/" app/build.gradle.kts
            echo "Updated app/build.gradle.kts versionName from $CURRENT_VERSION to $TARGET_VERSION"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add app/build.gradle.kts
            git commit -m "chore: align app versionName with release tag ${{ steps.meta.outputs.tag }} [skip ci]"
            git push origin "HEAD:${{ steps.source_ref.outputs.push_ref }}"
          else
            echo "app/build.gradle.kts already uses versionName=$TARGET_VERSION"
          fi

          RELEASE_SHA="$(git rev-parse HEAD)"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "Release commit SHA: $RELEASE_SHA"

      - name: Validate signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          MISSING=()
          [ -n "$KEYSTORE_BASE64" ] || MISSING+=(KEYSTORE_BASE64)
          [ -n "$KEYSTORE_PASSWORD" ] || MISSING+=(KEYSTORE_PASSWORD)
          [ -n "$KEY_ALIAS" ] || MISSING+=(KEY_ALIAS)
          [ -n "$KEY_PASSWORD" ] || MISSING+=(KEY_PASSWORD)

          if [ "${#MISSING[@]}" -gt 0 ]; then
            printf '::error::Missing required repository secrets: %s\n' "${MISSING[*]}"
            echo "::error::Set them in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          if ! printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > /dev/null 2>&1; then
            echo "::error::KEYSTORE_BASE64 is not valid base64. Regenerate with: base64 -w 0 release.keystore"
            exit 1
          fi

          echo "Signing secrets are present and KEYSTORE_BASE64 is decodable."

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Decode and validate keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          umask 077

          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > /tmp/release.keystore
          chmod 600 /tmp/release.keystore

          keytool -list \
            -keystore /tmp/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -noprompt > /dev/null

          echo "Decoded and validated /tmp/release.keystore"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build signed release APK variants
        id: build_apks
        shell: bash
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          INIT_FILE="app/src/main/java/io/github/vvb2060/callrecording/xposed/Init.java"
          INIT_BACKUP="/tmp/Init.java.release.bak"
          cp "$INIT_FILE" "$INIT_BACKUP"

          restore_init() {
            cp "$INIT_BACKUP" "$INIT_FILE"
          }
          trap restore_init EXIT

          variant_suffix() {
            case "$1" in
              FORCE_LEGACY_US) echo "force-US" ;;
              OBSERVE_ONLY) echo "observe" ;;
              *) echo "::error::Unknown compatibility mode: $1" >&2; exit 1 ;;
            esac
          }

          build_mode_apk() {
            local mode="$1"
            local output_name="$2"
            python - "$mode" "$INIT_FILE" <<'PY'
          import re
          import sys
          from pathlib import Path
          
          mode = sys.argv[1]
          path = Path(sys.argv[2])
          source = path.read_text()
          
          source = re.sub(
              r'private static final RecordingCompatibilityMode MODE = RecordingCompatibilityMode\.[A-Z_]+;',
              f'private static final RecordingCompatibilityMode MODE = RecordingCompatibilityMode.{mode};',
              source,
              count=1,
          )
          
          # Primary release must keep all silent-mode features enabled.
          if mode == "SAFE_GLOBAL_ENABLE":
              source = re.sub(
                  r'private static final boolean ENABLE_PROMPT_TTS_HOOKS = (true|false);',
                  'private static final boolean ENABLE_PROMPT_TTS_HOOKS = true;',
                  source,
                  count=1,
              )
              source = re.sub(
                  r'private static final boolean ENABLE_SILENT_PROMPT_FALLBACK = (true|false);',
                  'private static final boolean ENABLE_SILENT_PROMPT_FALLBACK = true;',
                  source,
                  count=1,
              )
          
          path.write_text(source)
          PY

            ./gradlew --no-daemon assembleRelease
            APK_PATH="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | sort | head -n 1)"
            [ -n "$APK_PATH" ] || { echo "::error::No release APK found under app/build/outputs/apk/release"; exit 1; }
            cp "$APK_PATH" "$output_name"
            sha256sum "$output_name" > "${output_name}.sha256"
            cp "$INIT_BACKUP" "$INIT_FILE"
          }

          ./gradlew --no-daemon clean

          VARIANT_FILES=()
          SELECTED_VARIANTS=0
          PRIMARY_APK='${{ steps.meta.outputs.apk_basename }}'

          if [ "${{ inputs.include_safe_global_enable }}" = "true" ]; then
            build_mode_apk "SAFE_GLOBAL_ENABLE" "$PRIMARY_APK"
            VARIANT_FILES+=("$PRIMARY_APK" "${PRIMARY_APK}.sha256")
            SELECTED_VARIANTS=$((SELECTED_VARIANTS + 1))
          fi

          if [ "${{ inputs.include_force_legacy_us }}" = "true" ]; then
            APK_NAME="callrecording-${{ steps.meta.outputs.tag }}-$(variant_suffix FORCE_LEGACY_US).apk"
            build_mode_apk "FORCE_LEGACY_US" "$APK_NAME"
            VARIANT_FILES+=("$APK_NAME" "${APK_NAME}.sha256")
            SELECTED_VARIANTS=$((SELECTED_VARIANTS + 1))
          fi

          if [ "${{ inputs.include_observe_only }}" = "true" ]; then
            APK_NAME="callrecording-${{ steps.meta.outputs.tag }}-$(variant_suffix OBSERVE_ONLY).apk"
            build_mode_apk "OBSERVE_ONLY" "$APK_NAME"
            VARIANT_FILES+=("$APK_NAME" "${APK_NAME}.sha256")
            SELECTED_VARIANTS=$((SELECTED_VARIANTS + 1))
          fi

          if [ "$SELECTED_VARIANTS" -eq 0 ]; then
            echo "::error::No variant selected. Enable at least one include_* input."
            exit 1
          fi

          {
            if [ "${{ inputs.include_safe_global_enable }}" = "true" ]; then
              echo "release_apk=$PRIMARY_APK"
              echo "release_sha256=${PRIMARY_APK}.sha256"
            else
              FIRST_APK="$(printf '%s\n' "${VARIANT_FILES[@]}" | grep '\.apk$' | head -n 1)"
              FIRST_SHA="${FIRST_APK}.sha256"
              echo "release_apk=$FIRST_APK"
              echo "release_sha256=$FIRST_SHA"
            fi
            echo "release_files<<EOF"
            for f in "${VARIANT_FILES[@]}"; do
              echo "$f"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Inspect and validate built APK
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            case "$file" in
              *.apk)
                echo "Validating APK: $file"
                if unzip -p "$file" assets/xposed_init > /dev/null 2>&1; then
                  unzip -p "$file" assets/xposed_init | grep -qx 'io.github.vvb2060.callrecording.xposed.Init' || {
                    echo "::error::$file: assets/xposed_init does not contain io.github.vvb2060.callrecording.xposed.Init"
                    exit 1
                  }
                else
                  echo "::error::$file does not contain expected Xposed entry point (assets/xposed_init)"
                  exit 1
                fi
                ;;
            esac
          done <<< "${{ steps.build_apks.outputs.release_files }}"

      - name: Generate release notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          AI_RELEASE_NOTES_MODEL: ${{ vars.AI_RELEASE_NOTES_MODEL || 'openai/gpt-4.1-mini' }}
        run: |
          set -euo pipefail

          TAG='${{ steps.meta.outputs.tag }}'
          PREV_TAG='${{ steps.meta.outputs.prev_tag }}'
          RELEASE_SHA='${{ steps.sync_version.outputs.release_sha }}'
          REPO_URL='${{ github.server_url }}/${{ github.repository }}'
          NOTES_FILE=/tmp/release-notes.md
          BASE_NOTES_FILE=/tmp/release-notes-base.md
          LOCAL_NOTES_FILE=/tmp/release-notes-local.md
          CONTEXT_JSON=/tmp/release-context.json
          CONTEXT_JSONL=/tmp/release-context.jsonl
          REQUEST_JSON=/tmp/github-models-request.json
          AI_RESPONSE_JSON=/tmp/github-models-response.json
          AI_BODY_FILE=/tmp/release-notes-ai.md

          build_local_notes() {
            local compare_url="$1"
            mapfile -t COMMITS < <(git log --no-merges --pretty=format:'%H%x09%s' "${PREV_TAG}..${RELEASE_SHA}")

            declare -A SEEN=()
            declare -a ITEMS=()

            for COMMIT in "${COMMITS[@]}"; do
              SHA="${COMMIT%%$'\t'*}"
              SUBJECT="${COMMIT#*$'\t'}"

              PR_TITLE="$(gh api \
                -H 'Accept: application/vnd.github+json' \
                "/repos/$GITHUB_REPOSITORY/commits/$SHA/pulls" \
                --jq 'if length > 0 then "\(.[0].title) (#\(.[0].number))" else "" end' 2>/dev/null || true)"

              ENTRY="${PR_TITLE:-$SUBJECT}"
              ENTRY="$(printf '%s' "$ENTRY" | tr -s ' ')"
              [ -n "$ENTRY" ] || continue

              if [ -z "${SEEN[$ENTRY]+x}" ]; then
                ITEMS+=("$ENTRY")
                SEEN["$ENTRY"]=1
              fi
            done

            {
              printf '### Changes since %s\n' "$PREV_TAG"
              if [ "${#ITEMS[@]}" -eq 0 ]; then
                printf -- '- No consolidated changes found.\n'
              else
                for ENTRY in "${ITEMS[@]}"; do
                  printf -- '- %s\n' "$ENTRY"
                done
              fi
              printf '\n**Full Changelog**: %s\n' "$compare_url"
            } > "$LOCAL_NOTES_FILE"
          }

          if [ -z "$PREV_TAG" ]; then
            {
              printf '### Initial release\n'
              printf '\n'
              printf 'This is the initial signed APK release for this project.\n'
              printf 'See the README for installation and usage guidance.\n'
            } > "$NOTES_FILE"
            echo "notes_mode=initial" >> "$GITHUB_OUTPUT"
            echo "Release notes mode: initial"
            echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMPARE_URL="$REPO_URL/compare/$PREV_TAG...$TAG"
          NOTES_MODE="local-fallback"

          build_local_notes "$COMPARE_URL"

          GH_NOTES=""
          if GH_NOTES="$(gh api -X POST \
            -H 'Accept: application/vnd.github+json' \
            "/repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$TAG" \
            -f target_commitish="$RELEASE_SHA" \
            -f previous_tag_name="$PREV_TAG" \
            --jq '.body // ""' 2>/dev/null)"; then
            if [ -n "$(printf '%s' "$GH_NOTES" | tr -d '[:space:]')" ]; then
              printf '%s\n' "$GH_NOTES" > "$BASE_NOTES_FILE"
              NOTES_MODE="github-generated"
            else
              echo "::warning::GitHub generated release notes were empty; falling back to local deterministic notes."
              cp "$LOCAL_NOTES_FILE" "$BASE_NOTES_FILE"
            fi
          else
            echo "::warning::GitHub generated release notes API failed; falling back to local deterministic notes."
            cp "$LOCAL_NOTES_FILE" "$BASE_NOTES_FILE"
          fi

          : > "$CONTEXT_JSONL"
          mapfile -t COMMITS < <(git log --no-merges --pretty=format:'%H%x09%s' "${PREV_TAG}..${RELEASE_SHA}")
          for COMMIT in "${COMMITS[@]}"; do
            SHA="${COMMIT%%$'\t'*}"
            SUBJECT="${COMMIT#*$'\t'}"
            SHORT_SHA="$(git rev-parse --short "$SHA")"

            if PR_JSON="$(gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/$GITHUB_REPOSITORY/commits/$SHA/pulls" 2>/dev/null || true)"; then
              :
            fi
            PR_JSON="${PR_JSON:-[]}"

            printf '%s' "$PR_JSON" | jq -c --arg sha "$SHA" --arg short_sha "$SHORT_SHA" --arg subject "$SUBJECT" '
              (if (type == "array" and length > 0) then .[0] else null end) as $pr
              | {
                  sha: $sha,
                  short_sha: $short_sha,
                  subject: $subject,
                  pr_number: ($pr.number // null),
                  pr_title: ($pr.title // null),
                  pr_body: (($pr.body // "")[0:3000]),
                  pr_labels: (($pr.labels // []) | map(.name)),
                  pr_author: ($pr.user.login // null)
                }
            ' >> "$CONTEXT_JSONL"
          done

          jq -s \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg tag "$TAG" \
            --arg previous_tag "$PREV_TAG" \
            --arg release_sha "$RELEASE_SHA" \
            --arg compare_url "$COMPARE_URL" \
            --rawfile github_generated_notes "$BASE_NOTES_FILE" '
            {
              repository: $repository,
              tag: $tag,
              previous_tag: $previous_tag,
              release_sha: $release_sha,
              compare_url: $compare_url,
              github_generated_notes: $github_generated_notes,
              changes: .
            }
          ' "$CONTEXT_JSONL" > "$CONTEXT_JSON"

          USER_PROMPT="$(jq -cn --rawfile ctx "$CONTEXT_JSON" '
            "Release context JSON:\n\($ctx)\n\nWrite concise plain-English GitHub release notes for an Android APK release.\nUse only supplied release context.\nDo not invent features, fixes, test results, compatibility, privacy, safety, integrity, or Play Store claims.\nConsolidate repeated commit/PR noise.\nPrefer user-visible changes over internal churn.\nMention build/release plumbing only if materially relevant to the artifact.\nOutput Markdown only.\nDo not include a Full Changelog link because the workflow appends one.\nKeep to one short summary paragraph plus 3-8 bullets unless there is very little to say."
          ')"

          jq -n \
            --arg model "$AI_RELEASE_NOTES_MODEL" \
            --arg system_msg "You are a careful release note editor. Produce concise factual markdown based only on provided context." \
            --arg user_msg "$USER_PROMPT" '
            {
              model: $model,
              temperature: 0.2,
              messages: [
                { role: "system", content: $system_msg },
                { role: "user", content: $user_msg }
              ]
            }
          ' > "$REQUEST_JSON"

          AI_OK=0
          if curl --silent --show-error --fail \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            --data @"$REQUEST_JSON" \
            https://models.github.ai/inference/chat/completions > "$AI_RESPONSE_JSON" 2>/dev/null; then
            if AI_CONTENT="$(jq -r '.choices[0].message.content // ""' "$AI_RESPONSE_JSON" 2>/dev/null || true)"; then
              :
            fi
            AI_CONTENT="${AI_CONTENT:-}"
            if [ -n "$(printf '%s' "$AI_CONTENT" | tr -d '[:space:]')" ]; then
              if printf '%s' "$AI_CONTENT" | grep -Eiq '^\s*(I )?(cannot|can'\''t|am unable|apologize|sorry,|as an ai)'; then
                echo "::warning::AI rewrite returned refusal-like text; using deterministic fallback."
              else
                printf '%s\n' "$AI_CONTENT" > "$AI_BODY_FILE"
                {
                  cat "$AI_BODY_FILE"
                  printf '\n**Full Changelog**: %s\n' "$COMPARE_URL"
                } > "$NOTES_FILE"
                AI_OK=1
                NOTES_MODE="ai"
              fi
            else
              echo "::warning::AI rewrite returned empty content; using deterministic fallback."
            fi
          else
            echo "::warning::GitHub Models call failed; using deterministic fallback."
          fi

          if [ "$AI_OK" -ne 1 ]; then
            cp "$BASE_NOTES_FILE" "$NOTES_FILE"
          fi

          echo "Release notes mode: $NOTES_MODE"
          echo "notes_mode=$NOTES_MODE" >> "$GITHUB_OUTPUT"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.meta.outputs.tag }}
          path: ${{ steps.build_apks.outputs.release_files }}
          if-no-files-found: error

      - name: Create or update git tag
        shell: bash
        run: |
          set -euo pipefail
          TAG='${{ steps.meta.outputs.tag }}'
          TARGET_SHA='${{ steps.sync_version.outputs.release_sha }}'

          if git rev-parse -q --verify "refs/tags/$TAG" > /dev/null; then
            existing_tag_sha="$(git rev-list -n1 "refs/tags/$TAG")"
            if [ "$existing_tag_sha" = "$TARGET_SHA" ]; then
              echo "Tag $TAG already exists and points at the release commit ($TARGET_SHA); leaving it unchanged."
            else
              echo "::error::Tag $TAG already exists but points at commit $existing_tag_sha, not the release commit $TARGET_SHA"
              exit 1
            fi
          else
            git tag "$TAG" "$TARGET_SHA"
            git push origin "refs/tags/$TAG"
            echo "Created and pushed tag $TAG for commit $TARGET_SHA"
          fi

      - name: Publish GitHub release
        id: publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: ${{ steps.build_apks.outputs.release_files }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true

      - name: Release summary
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_URL='${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.meta.outputs.tag }}'
          SUMMARY_LINE="Release ${{ steps.meta.outputs.tag }} published: $RELEASE_URL"
          echo "$SUMMARY_LINE"
          echo "$SUMMARY_LINE" >> "$GITHUB_STEP_SUMMARY"
